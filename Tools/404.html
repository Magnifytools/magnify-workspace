<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Magnify Tools</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'PP Neue Montreal'; src: url('fonts/PPNeueMontreal-Book.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'PP Neue Montreal'; src: url('fonts/PPNeueMontreal-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'PP Neue Montreal', system-ui, sans-serif; background: #0A0A0A; color: #FAFAFA; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: inherit; text-decoration: none; }

  nav { position: sticky; top: 0; z-index: 10; background: rgba(10,10,10,0.9); backdrop-filter: blur(24px); padding: 20px 32px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .nav-logo { display: inline-flex; align-items: center; gap: 14px; }
  .nav-logo-icon svg { width: 32px; height: 32px; display: block; }
  .nav-logo-text { font-family: 'PP Neue Montreal'; font-size: 15px; font-weight: 500; letter-spacing: 0.35em; color: #FAFAFA; text-transform: uppercase; }

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 24px; }
  .content { max-width: 720px; width: 100%; }
  .label { font-size: 13px; font-weight: 500; letter-spacing: 2.25px; text-transform: uppercase; color: #999; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(56px, 10vw, 112px); line-height: 1.02; font-weight: 400; margin: 16px 0 28px; letter-spacing: -1.5px; color: #F0F0F0; }
  h1 em { font-style: normal; background: #FFD600; color: #0A0A0A; padding: 1px 14px; }
  .sub { font-size: 19px; color: #999; max-width: 520px; margin-bottom: 40px; line-height: 1.7; }
  .cta { display: inline-flex; align-items: center; gap: 8px; background: #FFD600; color: #0A0A0A; font-size: 17px; font-weight: 500; padding: 16px 40px; border-radius: 50px; transition: all 0.35s cubic-bezier(0.16,1,0.3,1); }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,214,0,0.2); }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <span class="nav-logo-icon">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="30" stroke="#FAFAFA" stroke-width="1.8" fill="none"/>
        <line x1="10" y1="64" x2="90" y2="36" stroke="#777" stroke-width="1.4"/>
        <circle cx="73" cy="40" r="4.5" fill="#FAFAFA"/>
        <circle cx="73" cy="40" r="2" fill="#0A0A0A"/>
      </svg>
    </span>
    <span class="nav-logo-text">Magnify Tools</span>
  </a>
</nav>

<main>
  <div class="content">
    <span class="label">Error 404</span>
    <h1>Esta página<br>no <em>existe</em>.</h1>
    <p class="sub">El enlace que has seguido puede estar roto, o la página que buscas puede haber sido movida.</p>
    <a href="/" class="cta">Volver al inicio <span>↗</span></a>
  </div>
</main>

</body>
</html>
